<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cardápio Digital — Caraguá Digital (Demo)</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Cardápio Digital — Caraguá Digital</h1>
    <p class="tagline">Demo recriado a partir do protótipo público. Mostra cards, chat e visualização de itens.</p>
  </header>

  <main class="container">
    <section id="menu" class="menu">
      <h2>Cardápio</h2>
      <div id="cards" class="cards"></div>
    </section>

    <aside class="chat">
      <h2>Chat & Pedidos</h2>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <input id="message" placeholder="Escreva sua mensagem..." autocomplete="off">
        <button type="submit">Enviar</button>
      </form>

      <section class="order-panel" aria-label="Pedido atual">
        <h3>Seu pedido</h3>
        <div id="cartEmpty" class="cart-empty">Clique em um item do cardápio para adicionar ao pedido.</div>
        <ul id="cartList" class="cart-list" aria-live="polite"></ul>
        <div class="cart-total">
          <span>Total</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>

        <div class="order-fields">
          <input id="customerName" placeholder="Seu nome (opcional)" autocomplete="name">
          <input id="address" placeholder="Endereço para entrega (opcional)" autocomplete="street-address">
          <input id="paymentMethod" placeholder="Forma de pagamento (opcional)">
          <textarea id="notes" rows="3" placeholder="Observações (opcional)"></textarea>
        </div>

        <div class="order-actions">
          <button id="clearOrder" type="button" class="secondary">Limpar</button>
          <button id="sendOrder" type="button">Enviar pedido no WhatsApp</button>
        </div>
      </section>
    </aside>
  </main>

  <footer class="site-footer">
    <small>Recriado a partir de protótipo público — demonstrativo</small>
  </footer>

  <script src="src/templates.js"></script>
  <script src="src/app.js"></script>
</body>
</html>
