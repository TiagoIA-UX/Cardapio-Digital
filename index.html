<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cardápio Digital — Caraguá Digital (Demo)</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Cardápio Digital — Caraguá Digital</h1>
    <p class="tagline">Demo recriado a partir do protótipo público. Mostra cards, chat e visualização de itens.</p>
  </header>

  <main class="container">
    <section id="menu" class="menu">
      <div class="menu-heading">
        <h2>Prato do Dia</h2>
        <p>Categoria organizada</p>
      </div>
      <article id="dishOfDay" class="dish-highlight"></article>
      <div id="categorySections" class="category-sections"></div>
    </section>

    <aside class="chat">
      <h2>Chat & Pedidos</h2>
      <div class="chat-templates">
        <label for="templateSelect">Template de pedido</label>
        <div class="template-controls">
          <select id="templateSelect">
            <option value="livre">Mensagem livre</option>
            <option value="entrega">Pedido para entrega</option>
            <option value="retirada">Pedido para retirada</option>
            <option value="encomenda">Encomenda especial</option>
          </select>
          <button type="button" id="applyTemplate">Aplicar template</button>
        </div>
        <small>Envio direto para WhatsApp: <strong id="targetPhone"></strong></small>
      </div>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <input id="message" placeholder="Escreva sua mensagem ou aplique um template..." autocomplete="off">
        <button type="submit">Enviar no WhatsApp</button>
      </form>
    </aside>
  </main>

  <footer class="site-footer">
    <small>Recriado a partir de protótipo público — demonstrativo</small>
  </footer>

  <script src="src/app.js"></script>
</body>
</html>
