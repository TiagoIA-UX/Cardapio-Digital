<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cardápio Digital — Caraguá Digital (Demo)</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Cardápio Digital — Caraguá Digital</h1>
    <p class="tagline">Demo recriado a partir do protótipo público. Mostra cards, chat e visualização de itens.</p>
  </header>

  <main class="container">
    <section id="menu" class="menu">
      <div class="menu-heading">
        <h2>Prato do Dia</h2>
        <p>Categoria organizada</p>
      </div>
      <article id="dishOfDay" class="dish-highlight"></article>
      <div id="categorySections" class="category-sections"></div>
    </section>

    <aside class="chat">
      <h2>Chat & Pedidos</h2>
      <div class="chat-templates">
        <label for="templateSelect">Template de pedido</label>
        <div class="template-controls">
          <select id="templateSelect">
            <option value="livre">Mensagem livre</option>
            <option value="entrega">Pedido para entrega</option>
            <option value="retirada">Pedido para retirada</option>
            <option value="encomenda">Encomenda especial</option>
          </select>
          <button type="button" id="applyTemplate">Aplicar template</button>
        </div>
        <small>Envio direto para WhatsApp: <strong id="targetPhone"></strong></small>
      </div>
      <section class="order-details">
        <h3>Dados para agilizar o atendimento</h3>
        <div class="order-grid">
          <label for="customerName">Nome do cliente *</label>
          <input id="customerName" autocomplete="name" placeholder="Seu nome completo">

          <label for="customerPhone">Telefone para contato *</label>
          <input id="customerPhone" autocomplete="tel" placeholder="(12) 99999-9999">

          <label for="fulfillmentType">Entrega ou retirada *</label>
          <select id="fulfillmentType">
            <option value="entrega">Entrega</option>
            <option value="retirada">Retirada</option>
          </select>

          <div id="deliveryFields" class="conditional-fields">
            <label for="addressStreet">Rua/Avenida *</label>
            <input id="addressStreet" autocomplete="address-line1" placeholder="Ex.: Av. Brasil">

            <label for="addressNumber">Número *</label>
            <input id="addressNumber" placeholder="Ex.: 123">

            <label for="addressDistrict">Bairro *</label>
            <input id="addressDistrict" autocomplete="address-level2" placeholder="Ex.: Centro">

            <label for="addressReference">Ponto de referência</label>
            <input id="addressReference" placeholder="Opcional">
          </div>

          <label for="paymentMethod">Forma de pagamento *</label>
          <select id="paymentMethod">
            <option value="">Selecione</option>
            <option value="pix">PIX</option>
            <option value="cartao">Cartão</option>
            <option value="dinheiro">Dinheiro</option>
          </select>

          <div id="cashChangeWrapper" class="conditional-fields">
            <label for="cashChange">Troco para quanto? *</label>
            <input id="cashChange" placeholder="Ex.: R$ 100,00">
          </div>
        </div>
      </section>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form">
        <textarea id="message" placeholder="Escreva os itens do pedido ou aplique um template..." autocomplete="off"></textarea>
        <button type="submit">Enviar no WhatsApp</button>
      </form>
    </aside>
  </main>

  <footer class="site-footer">
    <small>Recriado a partir de protótipo público — demonstrativo</small>
  </footer>

  <script src="src/app.js"></script>
</body>
</html>
