<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cardápio Digital — Caraguá Digital</title>
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <header class="site-header">
    <h1>Cardápio Digital — Caraguá Digital</h1>
    <p class="tagline">Escolha seus itens e envie o pedido diretamente pelo WhatsApp!</p>
  </header>

  <main class="container">
    <section id="menu" class="menu">
      <h2>Cardápio</h2>
      <div id="cards" class="cards"></div>
    </section>

    <aside class="cart-panel">
      <h2>Seu Pedido</h2>
      <div id="cartItems" class="cart-items">
        <p class="cart-empty">Seu carrinho está vazio.<br>Adicione itens do cardápio!</p>
      </div>
      <div id="cartSummary" class="cart-summary hidden">
        <div class="cart-total">
          <span>Total:</span>
          <strong id="cartTotal">R$ 0,00</strong>
        </div>
        <div class="cart-actions">
          <button id="btnClearCart" class="btn btn-secondary" type="button">Limpar</button>
          <button id="btnSendOrder" class="btn btn-whatsapp" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Enviar Pedido
          </button>
        </div>
      </div>

      <div id="orderOptions" class="order-options hidden">
        <h3>Como deseja receber?</h3>
        <div class="delivery-options">
          <label class="delivery-option">
            <input type="radio" name="deliveryType" value="delivery" checked>
            <span class="option-card">
              <strong>Entrega</strong>
              <small>Receba em casa</small>
            </span>
          </label>
          <label class="delivery-option">
            <input type="radio" name="deliveryType" value="pickup">
            <span class="option-card">
              <strong>Retirada</strong>
              <small>Buscar no local</small>
            </span>
          </label>
        </div>
        <div id="addressFields" class="address-fields">
          <input type="text" id="customerName" placeholder="Seu nome" required>
          <input type="text" id="customerAddress" placeholder="Endereço completo" required>
          <input type="text" id="customerComplement" placeholder="Complemento (opcional)">
          <input type="text" id="customerRef" placeholder="Ponto de referência (opcional)">
        </div>
        <div id="pickupFields" class="address-fields hidden">
          <input type="text" id="pickupName" placeholder="Seu nome" required>
        </div>
        <select id="paymentMethod" class="payment-select">
          <option value="">Forma de pagamento...</option>
          <option value="Dinheiro">Dinheiro</option>
          <option value="PIX">PIX</option>
          <option value="Cartão de Crédito">Cartão de Crédito</option>
          <option value="Cartão de Débito">Cartão de Débito</option>
        </select>
        <input type="text" id="orderNotes" placeholder="Observações do pedido (opcional)" class="order-notes">
        <button id="btnConfirmOrder" class="btn btn-whatsapp btn-full" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
          Confirmar e Enviar via WhatsApp
        </button>
        <button id="btnCancelOrder" class="btn btn-secondary btn-full" type="button">Voltar</button>
      </div>
    </aside>
  </main>

  <footer class="site-footer">
    <small>Caraguá Digital — Pedidos via WhatsApp</small>
  </footer>

  <script src="src/app.js"></script>
</body>
</html>
