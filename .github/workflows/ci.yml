name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Types
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: |
          mkdir -p .next/types
          echo "type AppRoutes=string;type AppRouteHandlerRoutes=string;type PageRoutes=never;type LayoutRoutes=string;type RedirectRoutes=never;type RewriteRoutes=never;type Routes=string;interface ParamMap {}" > .next/types/routes.d.ts
          npx tsc --noEmit

  security:
    name: Dependency Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Secret scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: [quality]
    env:
      NEXT_PUBLIC_SITE_URL: https://zairyx.com.br
      NEXT_PUBLIC_APP_URL: https://zairyx.com.br
      MERCADO_PAGO_ENV: sandbox
      NEXT_PUBLIC_MERCADO_PAGO_ENV: sandbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export build environment
        env:
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
          EXPORT_KEYS_JSON: '["NEXT_PUBLIC_SUPABASE_URL","NEXT_PUBLIC_SUPABASE_ANON_KEY","SUPABASE_SERVICE_ROLE_KEY","MERCADO_PAGO_ACCESS_TOKEN","MP_ACCESS_TOKEN","NEXT_PUBLIC_MERCADO_PAGO_PUBLIC_KEY","MERCADO_PAGO_PUBLIC_KEY",{"target":"MERCADO_PAGO_TEST_ACCESS_TOKEN","source":"MP_TEST_ACCESS_TOKEN"},{"target":"NEXT_PUBLIC_MERCADO_PAGO_TEST_PUBLIC_KEY","source":"MP_TEST_PUBLIC_KEY"},{"target":"MERCADO_PAGO_TEST_PUBLIC_KEY","source":"MP_TEST_PUBLIC_KEY"},"CRON_SECRET","MP_WEBHOOK_SECRET","ADMIN_SECRET_KEY","OWNER_EMAIL","GROQ_API_KEY","INTERNAL_API_SECRET","RESEND_API_KEY","R2_ACCOUNT_ID","R2_ACCESS_KEY_ID","R2_SECRET_ACCESS_KEY","R2_BUCKET_NAME","R2_PUBLIC_URL","NEXT_PUBLIC_COMPANY_CNPJ","UPSTASH_REDIS_REST_URL","UPSTASH_REDIS_REST_TOKEN"]'
        run: |
          node scripts/export-github-env.mjs

      - name: Validate environment for build
        run: node scripts/doctor.mjs

      - name: Build production app
        run: npm run build

  tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [quality]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  pre-deploy:
    name: Pre-deploy Checklist
    runs-on: ubuntu-latest
    needs: [build, security, tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      CI: 'true'
      NEXT_PUBLIC_SITE_URL: https://zairyx.com.br
      NEXT_PUBLIC_APP_URL: https://zairyx.com.br
      MERCADO_PAGO_ENV: sandbox
      NEXT_PUBLIC_MERCADO_PAGO_ENV: sandbox
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export checklist environment
        env:
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
          EXPORT_KEYS_JSON: '["NEXT_PUBLIC_SUPABASE_URL","NEXT_PUBLIC_SUPABASE_ANON_KEY","SUPABASE_SERVICE_ROLE_KEY","MERCADO_PAGO_ACCESS_TOKEN","MP_ACCESS_TOKEN","NEXT_PUBLIC_MERCADO_PAGO_PUBLIC_KEY","MERCADO_PAGO_PUBLIC_KEY",{"target":"MERCADO_PAGO_TEST_ACCESS_TOKEN","source":"MP_TEST_ACCESS_TOKEN"},{"target":"NEXT_PUBLIC_MERCADO_PAGO_TEST_PUBLIC_KEY","source":"MP_TEST_PUBLIC_KEY"},{"target":"MERCADO_PAGO_TEST_PUBLIC_KEY","source":"MP_TEST_PUBLIC_KEY"},"CRON_SECRET","MP_WEBHOOK_SECRET","ADMIN_SECRET_KEY","OWNER_EMAIL","GROQ_API_KEY","INTERNAL_API_SECRET","RESEND_API_KEY","R2_ACCOUNT_ID","R2_ACCESS_KEY_ID","R2_SECRET_ACCESS_KEY","R2_BUCKET_NAME","R2_PUBLIC_URL","NEXT_PUBLIC_COMPANY_CNPJ","UPSTASH_REDIS_REST_URL","UPSTASH_REDIS_REST_TOKEN"]'
        run: |
          node scripts/export-github-env.mjs

      - name: Local project checklist
        run: npm run check

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [build]
    env:
      CI: 'true'
      NEXT_PUBLIC_SITE_URL: https://zairyx.com.br
      NEXT_PUBLIC_APP_URL: https://zairyx.com.br
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Export E2E environment
        env:
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
          EXPORT_KEYS_JSON: '["NEXT_PUBLIC_SUPABASE_URL","NEXT_PUBLIC_SUPABASE_ANON_KEY","SUPABASE_SERVICE_ROLE_KEY","NEXT_PUBLIC_SITE_URL"]'
        run: |
          node scripts/export-github-env.mjs

      - name: Build app
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test --project=chromium

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
